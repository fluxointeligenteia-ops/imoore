name: Deploy production

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/imoore_key
          chmod 600 ~/.ssh/imoore_key
          ssh-keyscan -p "${{ secrets.VPS_PORT || '22' }}" "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy on VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT || '22' }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          HEALTHCHECK_URL: ${{ secrets.HEALTHCHECK_URL }}
        run: |
          ssh -i ~/.ssh/imoore_key -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" "
            set -e
            cd \"$DEPLOY_PATH\"
            git fetch --prune origin
            git reset --hard origin/main
            chmod +x scripts/*.sh
            ./scripts/update.sh
          "

      - name: Healthcheck
        env:
          HEALTHCHECK_URL: ${{ secrets.HEALTHCHECK_URL }}
        run: |
          curl --fail --show-error --silent --max-time 20 "$HEALTHCHECK_URL" > /dev/null
